<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ subject }}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f5f7;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
        Helvetica, Arial, sans-serif;
      color: #333333;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        border: 1px solid #eaebed;
      "
    >
      <div
        style="
          background-color: #ffffff;
          padding: 32px 32px 16px 32px;
          text-align: center;
          border-bottom: 1px solid #eaebed;
        "
      >
        <h1
          style="
            margin: 0;
            font-size: 24px;
            color: #111827;
            letter-spacing: -0.5px;
          "
        >
          {{ settings.app.name }}
        </h1>
      </div>

      <div style="padding: 32px">
        <p
          style="
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
          "
        >
          Hello,
        </p>
        <p
          style="
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
          "
        >
          You are receiving this email because your server,
          <strong>{{ server.name }}</strong>, has finished its restoration from
          a backup.
        </p>
        <p
          style="
            margin-top: 0;
            margin-bottom: 32px;
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
          "
        >
          Click the button below to access the server:
        </p>

        <div style="text-align: center; margin-bottom: 32px">
          <a
            href="{{ server_link }}"
            style="
              display: inline-block;
              padding: 14px 28px;
              background-color: #2563eb;
              color: #ffffff;
              text-decoration: none;
              font-size: 16px;
              font-weight: 600;
              border-radius: 6px;
            "
          >
            Access Server
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
