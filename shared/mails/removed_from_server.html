<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ subject }}</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f5f7;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
        Helvetica, Arial, sans-serif;
      color: #333333;
    "
  >
    <div
      style="
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        border: 1px solid #eaebed;
      "
    >
      <div
        style="
          background-color: #ffffff;
          padding: 32px 32px 16px 32px;
          text-align: center;
          border-bottom: 1px solid #eaebed;
        "
      >
        <h1
          style="
            margin: 0;
            font-size: 24px;
            color: #111827;
            letter-spacing: -0.5px;
          "
        >
          {{ settings.app.name }}
        </h1>
      </div>

      <div style="padding: 32px">
        <p
          style="
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
          "
        >
          Hello,
        </p>
        <p
          style="
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
          "
        >
          You are receiving this email because you have been removed as a
          subuser from
          <strong>{{ server.name }}</strong>.
        </p>

        <div
          style="
            padding: 24px 32px;
            background-color: #f9fafb;
            border-top: 1px solid #eaebed;
            text-align: center;
          "
        >
          <p
            style="margin: 0; font-size: 13px; color: #9ca3af; line-height: 1.5"
          >
            There is no action required on your side. If you believe this was a mistake,
						please contact the server's administrator for more information.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
