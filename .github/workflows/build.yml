name: Release Nightly

on:
  push:
    branches:
      - main

env:
  BIN_NAME: panel-rs
  AIO_BIN_NAME: panel-rs-aio
  PROJECT_NAME: panel-rs

jobs:
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Build frontend
        run: |
          cd frontend
          pnpm build:ci

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/dist/

  dist:
    name: Dist
    needs: [build-frontend]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        build:
          - x86_64-linux
          - aarch64-linux
          - riscv64-linux
          - ppc64le-linux
          #- x86_64-windows
        include:
          - build: x86_64-linux
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary_suffix: ""
          - build: aarch64-linux
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            binary_suffix: ""
          - build: riscv64-linux
            os: ubuntu-24.04
            target: riscv64gc-unknown-linux-gnu
            binary_suffix: ""
          - build: ppc64le-linux
            os: ubuntu-24.04
            target: powerpc64le-unknown-linux-gnu
            binary_suffix: ""
          #- build: x86_64-windows
          #  os: windows-latest
          #  target: x86_64-pc-windows-msvc
          #  binary_suffix: ".exe"

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Install Windows extra tools
        if: runner.os == 'Windows'
        run: |
          choco install nasm
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}

      - name: Install cross
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cross build --release --target ${{ matrix.target }} -p $BIN_NAME
          cross build --release --target ${{ matrix.target }} -p $AIO_BIN_NAME

      - name: Build release binaries (Non-Linux)
        if: ${{ !contains(matrix.target, 'linux') }}
        run: |
          cargo build --release --target ${{ matrix.target }} -p $BIN_NAME
          cargo build --release --target ${{ matrix.target }} -p $AIO_BIN_NAME

      - name: Prepare binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME${{ matrix.binary_suffix }}" "dist/$BIN_NAME-${{ matrix.build }}"
          cp "target/${{ matrix.target }}/release/$AIO_BIN_NAME${{ matrix.binary_suffix }}" "dist/$AIO_BIN_NAME-${{ matrix.build }}"

      - name: Prepare binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\${{ matrix.target }}\release\$env:BIN_NAME${{ matrix.binary_suffix }}" "dist\$env:BIN_NAME-${{ matrix.build }}${{ matrix.binary_suffix }}"
          Copy-Item "target\${{ matrix.target }}\release\$env:AIO_BIN_NAME${{ matrix.binary_suffix }}" "dist\$env:AIO_BIN_NAME-${{ matrix.build }}${{ matrix.binary_suffix }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.build }}
          path: |
            dist/${{ env.BIN_NAME }}-${{ matrix.build }}${{ matrix.binary_suffix }}
            dist/${{ env.AIO_BIN_NAME }}-${{ matrix.build }}${{ matrix.binary_suffix }}

  create-multiarch-image:
    name: Create multi-arch Docker images
    needs: [dist]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare binaries
        run: |
          mkdir -p .docker/amd64 .docker/arm64 .docker/riscv64 .docker/ppc64le
          cp dist/${{ env.PROJECT_NAME }}-x86_64-linux/${{ env.BIN_NAME }}-x86_64-linux .docker/amd64/panel-rs
          cp dist/${{ env.PROJECT_NAME }}-aarch64-linux/${{ env.BIN_NAME }}-aarch64-linux .docker/arm64/panel-rs
          cp dist/${{ env.PROJECT_NAME }}-riscv64-linux/${{ env.BIN_NAME }}-riscv64-linux .docker/riscv64/panel-rs
          cp dist/${{ env.PROJECT_NAME }}-ppc64le-linux/${{ env.BIN_NAME }}-ppc64le-linux .docker/ppc64le/panel-rs

          cp dist/${{ env.PROJECT_NAME }}-x86_64-linux/${{ env.AIO_BIN_NAME }}-x86_64-linux .docker/amd64/panel-rs-aio
          cp dist/${{ env.PROJECT_NAME }}-aarch64-linux/${{ env.AIO_BIN_NAME }}-aarch64-linux .docker/arm64/panel-rs-aio
          cp dist/${{ env.PROJECT_NAME }}-riscv64-linux/${{ env.AIO_BIN_NAME }}-riscv64-linux .docker/riscv64/panel-rs-aio
          cp dist/${{ env.PROJECT_NAME }}-ppc64le-linux/${{ env.AIO_BIN_NAME }}-ppc64le-linux .docker/ppc64le/panel-rs-aio

          chmod +x .docker/*/panel-rs .docker/*/panel-rs-aio

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le
          push: true
          tags: ghcr.io/${{ github.repository }}:nightly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push multi-arch AIO image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.aio
          platforms: linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le
          push: true
          tags: ghcr.io/${{ github.repository }}:nightly-aio
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-heavy-image:
    name: Build Heavy Docker images (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            tag_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag_suffix: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push heavy platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.heavy
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository }}:nightly-heavy-${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=heavy-${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=heavy-${{ matrix.tag_suffix }}

      - name: Build & push heavy AIO platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.heavy.aio
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository }}:nightly-heavy-aio-${{ matrix.tag_suffix }}
          cache-from: type=gha,scope=heavy-${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=heavy-${{ matrix.tag_suffix }}

  merge-heavy-image:
    name: Merge Heavy Docker manifests
    needs: [build-heavy-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifests
        run: |
          docker buildx imagetools create -t ghcr.io/${{ github.repository }}:nightly-heavy \
            ghcr.io/${{ github.repository }}:nightly-heavy-amd64 \
            ghcr.io/${{ github.repository }}:nightly-heavy-arm64

          docker buildx imagetools create -t ghcr.io/${{ github.repository }}:nightly-heavy-aio \
            ghcr.io/${{ github.repository }}:nightly-heavy-aio-amd64 \
            ghcr.io/${{ github.repository }}:nightly-heavy-aio-arm64
