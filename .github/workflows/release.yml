name: Release

on:
  push:
    tags:
      - "release-*"

env:
  BIN_NAME: panel-rs
  AIO_BIN_NAME: panel-rs-aio
  PROJECT_NAME: panel-rs
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/${{ github.repository }}

jobs:
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom-source.cyclonedx.json
          artifact-name: sbom-source.cyclonedx.json
          upload-artifact: true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
          run_install: false

      - name: Install frontend dependencies
        run: |
          cd frontend
          pnpm install

      - name: Build frontend
        run: |
          cd frontend
          pnpm build:ci

      - name: Upload frontend build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/dist/

  dist:
    name: Dist
    needs: [build-frontend]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        build:
          - x86_64-linux
          - aarch64-linux
          - riscv64-linux
          - ppc64le-linux
          - x86_64-windows
        include:
          - build: x86_64-linux
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            binary_suffix: ""
          - build: aarch64-linux
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            binary_suffix: ""
          - build: riscv64-linux
            os: ubuntu-24.04
            target: riscv64gc-unknown-linux-gnu
            binary_suffix: ""
          - build: ppc64le-linux
            os: ubuntu-24.04
            target: powerpc64le-unknown-linux-gnu
            binary_suffix: ""
          - build: x86_64-windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_suffix: ".exe"

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Download frontend build
        uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Install Windows extra tools
        if: runner.os == 'Windows'
        run: |
          choco install nasm
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          cache-key: ${{ matrix.target }}

      - name: Install cross
        if: contains(matrix.target, 'linux')
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binaries (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" \
          cross build --release --target ${{ matrix.target }} -p $BIN_NAME
          cross build --release --target ${{ matrix.target }} -p $AIO_BIN_NAME

      - name: Build release binary (Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --target ${{ matrix.target }} -p $env:BIN_NAME

      - name: Prepare binaries (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/$BIN_NAME${{ matrix.binary_suffix }}" "dist/$BIN_NAME-${{ matrix.build }}"
          cp "target/${{ matrix.target }}/release/$AIO_BIN_NAME${{ matrix.binary_suffix }}" "dist/$AIO_BIN_NAME-${{ matrix.build }}"

      - name: Prepare binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target\${{ matrix.target }}\release\$env:BIN_NAME${{ matrix.binary_suffix }}" "dist\$env:BIN_NAME-${{ matrix.build }}${{ matrix.binary_suffix }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.build }}
          path: dist/*${{ matrix.binary_suffix }}

  publish-draft-release:
    name: Publish Draft Release
    needs: [dist, generate-sbom]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Determine if pre-release and strip prefix
        id: release_info
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_info.outputs.version }}
          draft: true
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            artifacts/${{ env.PROJECT_NAME }}-*/*
            artifacts/sbom-source.cyclonedx.json/sbom-source.cyclonedx.json

  create-multiarch-image:
    name: Create multi-arch Docker images
    needs: [dist, generate-sbom]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download source SBOM
        uses: actions/download-artifact@v8
        with:
          name: sbom-source.cyclonedx.json
          path: sbom

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare binaries
        run: |
          mkdir -p .docker/amd64 .docker/arm64 .docker/riscv64 .docker/ppc64le
          cp dist/${{ env.PROJECT_NAME }}-x86_64-linux/${{ env.BIN_NAME }}-x86_64-linux .docker/amd64/panel-rs
          cp dist/${{ env.PROJECT_NAME }}-aarch64-linux/${{ env.BIN_NAME }}-aarch64-linux .docker/arm64/panel-rs
          cp dist/${{ env.PROJECT_NAME }}-riscv64-linux/${{ env.BIN_NAME }}-riscv64-linux .docker/riscv64/panel-rs
          cp dist/${{ env.PROJECT_NAME }}-ppc64le-linux/${{ env.BIN_NAME }}-ppc64le-linux .docker/ppc64le/panel-rs

          cp dist/${{ env.PROJECT_NAME }}-x86_64-linux/${{ env.AIO_BIN_NAME }}-x86_64-linux .docker/amd64/panel-rs-aio
          cp dist/${{ env.PROJECT_NAME }}-aarch64-linux/${{ env.AIO_BIN_NAME }}-aarch64-linux .docker/arm64/panel-rs-aio
          cp dist/${{ env.PROJECT_NAME }}-riscv64-linux/${{ env.AIO_BIN_NAME }}-riscv64-linux .docker/riscv64/panel-rs-aio
          cp dist/${{ env.PROJECT_NAME }}-ppc64le-linux/${{ env.AIO_BIN_NAME }}-ppc64le-linux .docker/ppc64le/panel-rs-aio

          chmod +x .docker/*/panel-rs .docker/*/panel-rs-aio

      - name: Extract version and determine tags
        id: prep_tags
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"

          # Tag suffixes for the main image and the AIO image variant.
          MAIN_SUFFIXES=("${VERSION}")
          AIO_SUFFIXES=("${VERSION}-aio")

          if [[ "$VERSION" == *-* ]]; then
            MAIN_SUFFIXES+=("latest-pre")
            AIO_SUFFIXES+=("aio-pre")

            if [[ "$VERSION" == 1.0.0-* ]]; then
              MAIN_SUFFIXES+=("latest")
              AIO_SUFFIXES+=("aio")
            fi
          else
            MAIN_SUFFIXES+=("latest")
            AIO_SUFFIXES+=("aio")
          fi

          # Emit each suffix for both registries.
          DOCKER_TAGS=""
          for t in "${MAIN_SUFFIXES[@]}"; do
            DOCKER_TAGS="${DOCKER_TAGS}${DOCKER_TAGS:+,}${GHCR_IMAGE}:${t},${DOCKERHUB_IMAGE}:${t}"
          done

          AIO_TAGS=""
          for t in "${AIO_SUFFIXES[@]}"; do
            AIO_TAGS="${AIO_TAGS}${AIO_TAGS:+,}${GHCR_IMAGE}:${t},${DOCKERHUB_IMAGE}:${t}"
          done

          echo "DOCKER_TAGS=$DOCKER_TAGS" >> $GITHUB_ENV
          echo "AIO_TAGS=$AIO_TAGS" >> $GITHUB_ENV

      - name: Build & push multi-arch image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le
          push: true
          tags: ${{ env.DOCKER_TAGS }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attach source SBOM attestation to image (GHCR)
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom/sbom-source.cyclonedx.json
          push-to-registry: true

      - name: Attach source SBOM attestation to image (Docker Hub)
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom/sbom-source.cyclonedx.json
          push-to-registry: true

      - name: Build & push multi-arch AIO image
        id: build-aio
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.aio
          platforms: linux/amd64,linux/arm64,linux/riscv64,linux/ppc64le
          push: true
          tags: ${{ env.AIO_TAGS }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attach source SBOM attestation to AIO image (GHCR)
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.build-aio.outputs.digest }}
          sbom-path: sbom/sbom-source.cyclonedx.json
          push-to-registry: true

      - name: Attach source SBOM attestation to AIO image (Docker Hub)
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ env.DOCKERHUB_IMAGE }}
          subject-digest: ${{ steps.build-aio.outputs.digest }}
          sbom-path: sbom/sbom-source.cyclonedx.json
          push-to-registry: true

  build-heavy-image:
    name: Build Heavy Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            tag_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag_suffix: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push heavy platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.heavy
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:heavy-build-${{ matrix.tag_suffix }}
            ${{ env.DOCKERHUB_IMAGE }}:heavy-build-${{ matrix.tag_suffix }}
          sbom: scan-stages=true
          provenance: true
          cache-from: type=gha,scope=heavy-${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=heavy-${{ matrix.tag_suffix }}

  build-heavy-aio-image:
    name: Build Heavy AIO Docker image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            tag_suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag_suffix: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push heavy AIO platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/Dockerfile.heavy.aio
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:heavy-aio-build-${{ matrix.tag_suffix }}
            ${{ env.DOCKERHUB_IMAGE }}:heavy-aio-build-${{ matrix.tag_suffix }}
          sbom: scan-stages=true
          provenance: true
          cache-from: type=gha,scope=heavy-aio-${{ matrix.tag_suffix }}
          cache-to: type=gha,mode=max,scope=heavy-aio-${{ matrix.tag_suffix }}

  merge-heavy-image:
    name: Merge Heavy Docker manifest
    needs: [build-heavy-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and determine tags
        id: prep_tags
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"

          SUFFIXES=("${VERSION}-heavy")
          if [[ "$VERSION" == *-* ]]; then
            SUFFIXES+=("heavy-pre")
            if [[ "$VERSION" == 1.0.0-* ]]; then
              SUFFIXES+=("heavy")
            fi
          else
            SUFFIXES+=("heavy")
          fi

          GHCR_HEAVY_TAGS=""
          DOCKERHUB_HEAVY_TAGS=""
          for t in "${SUFFIXES[@]}"; do
            GHCR_HEAVY_TAGS="${GHCR_HEAVY_TAGS}${GHCR_HEAVY_TAGS:+,}${GHCR_IMAGE}:${t}"
            DOCKERHUB_HEAVY_TAGS="${DOCKERHUB_HEAVY_TAGS}${DOCKERHUB_HEAVY_TAGS:+,}${DOCKERHUB_IMAGE}:${t}"
          done

          echo "GHCR_HEAVY_TAGS=$GHCR_HEAVY_TAGS" >> $GITHUB_ENV
          echo "DOCKERHUB_HEAVY_TAGS=$DOCKERHUB_HEAVY_TAGS" >> $GITHUB_ENV

      - name: Create and push multi-arch manifest
        run: |
          # GHCR: assemble from the per-arch images pushed to GHCR.
          GHCR_SRC_AMD64="${GHCR_IMAGE}:heavy-build-amd64"
          GHCR_SRC_ARM64="${GHCR_IMAGE}:heavy-build-arm64"
          IFS=',' read -ra TAGS <<< "$GHCR_HEAVY_TAGS"
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "$TAG" "$GHCR_SRC_AMD64" "$GHCR_SRC_ARM64"
          done

          # Docker Hub: assemble from the per-arch images pushed to Docker Hub.
          DOCKERHUB_SRC_AMD64="${DOCKERHUB_IMAGE}:heavy-build-amd64"
          DOCKERHUB_SRC_ARM64="${DOCKERHUB_IMAGE}:heavy-build-arm64"
          IFS=',' read -ra TAGS <<< "$DOCKERHUB_HEAVY_TAGS"
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "$TAG" "$DOCKERHUB_SRC_AMD64" "$DOCKERHUB_SRC_ARM64"
          done

  merge-heavy-aio-image:
    name: Merge Heavy AIO Docker manifest
    needs: [build-heavy-aio-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version and determine tags
        id: prep_tags
        run: |
          RAW_TAG="${{ github.ref_name }}"
          VERSION="${RAW_TAG#release-}"

          SUFFIXES=("${VERSION}-heavy-aio")
          if [[ "$VERSION" == *-* ]]; then
            SUFFIXES+=("heavy-aio-pre")
            if [[ "$VERSION" == 1.0.0-* ]]; then
              SUFFIXES+=("heavy-aio")
            fi
          else
            SUFFIXES+=("heavy-aio")
          fi

          GHCR_HEAVY_AIO_TAGS=""
          DOCKERHUB_HEAVY_AIO_TAGS=""
          for t in "${SUFFIXES[@]}"; do
            GHCR_HEAVY_AIO_TAGS="${GHCR_HEAVY_AIO_TAGS}${GHCR_HEAVY_AIO_TAGS:+,}${GHCR_IMAGE}:${t}"
            DOCKERHUB_HEAVY_AIO_TAGS="${DOCKERHUB_HEAVY_AIO_TAGS}${DOCKERHUB_HEAVY_AIO_TAGS:+,}${DOCKERHUB_IMAGE}:${t}"
          done

          echo "GHCR_HEAVY_AIO_TAGS=$GHCR_HEAVY_AIO_TAGS" >> $GITHUB_ENV
          echo "DOCKERHUB_HEAVY_AIO_TAGS=$DOCKERHUB_HEAVY_AIO_TAGS" >> $GITHUB_ENV

      - name: Create and push multi-arch manifest
        run: |
          # GHCR: assemble from the per-arch images pushed to GHCR.
          GHCR_SRC_AMD64="${GHCR_IMAGE}:heavy-aio-build-amd64"
          GHCR_SRC_ARM64="${GHCR_IMAGE}:heavy-aio-build-arm64"
          IFS=',' read -ra TAGS <<< "$GHCR_HEAVY_AIO_TAGS"
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "$TAG" "$GHCR_SRC_AMD64" "$GHCR_SRC_ARM64"
          done

          # Docker Hub: assemble from the per-arch images pushed to Docker Hub.
          DOCKERHUB_SRC_AMD64="${DOCKERHUB_IMAGE}:heavy-aio-build-amd64"
          DOCKERHUB_SRC_ARM64="${DOCKERHUB_IMAGE}:heavy-aio-build-arm64"
          IFS=',' read -ra TAGS <<< "$DOCKERHUB_HEAVY_AIO_TAGS"
          for TAG in "${TAGS[@]}"; do
            docker buildx imagetools create -t "$TAG" "$DOCKERHUB_SRC_AMD64" "$DOCKERHUB_SRC_ARM64"
          done
